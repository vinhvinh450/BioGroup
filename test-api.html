<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        button { padding: 5px 10px; cursor: pointer; }
        .success { background: #e8f5e9; }
        .error { background: #ffebee; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>API Diagnostic Test</h1>

    <div class="test">
        <h3>1. Test Products Endpoint</h3>
        <button onclick="testProducts()">Test GET /api/products</button>
        <pre id="products-result"></pre>
    </div>

    <div class="test">
        <h3>2. Test Register Endpoint</h3>
        <button onclick="testRegister()">Test POST /api/auth/register</button>
        <pre id="register-result"></pre>
    </div>

    <div class="test">
        <h3>3. Test Login Endpoint</h3>
        <button onclick="testLogin()">Test POST /api/auth/login</button>
        <pre id="login-result"></pre>
    </div>

    <div class="test">
        <h3>4. Test Users in Database</h3>
        <button onclick="testUsers()">Check Users</button>
        <pre id="users-result"></pre>
    </div>

    <script>
        const API_URL = 'http://localhost:5207/api';

        async function testProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                const data = await res.json();
                const result = document.getElementById('products-result');
                result.textContent = `Status: ${res.status}\n${JSON.stringify(data, null, 2)}`;
                result.parentElement.classList.add(res.ok ? 'success' : 'error');
            } catch (e) {
                document.getElementById('products-result').textContent = `Error: ${e.message}`;
                document.getElementById('products-result').parentElement.classList.add('error');
            }
        }

        async function testRegister() {
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@example.com',
                        phone: '0123456789',
                        password: 'Password123',
                        address: 'Test Address'
                    })
                });
                const data = await res.json();
                const result = document.getElementById('register-result');
                result.textContent = `Status: ${res.status}\n${JSON.stringify(data, null, 2)}`;
                result.parentElement.classList.add(res.ok ? 'success' : 'error');
            } catch (e) {
                document.getElementById('register-result').textContent = `Error: ${e.message}`;
                document.getElementById('register-result').parentElement.classList.add('error');
            }
        }

        async function testLogin() {
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'Password123'
                    })
                });
                const data = await res.json();
                const result = document.getElementById('login-result');
                result.textContent = `Status: ${res.status}\n${JSON.stringify(data, null, 2)}`;
                result.parentElement.classList.add(res.ok ? 'success' : 'error');
            } catch (e) {
                document.getElementById('login-result').textContent = `Error: ${e.message}`;
                document.getElementById('login-result').parentElement.classList.add('error');
            }
        }

        async function testUsers() {
            try {
                const res = await fetch(`${API_URL}/auth/test-users`);
                const data = await res.json();
                const result = document.getElementById('users-result');
                result.textContent = JSON.stringify(data, null, 2);
                result.parentElement.classList.add('success');
            } catch (e) {
                document.getElementById('users-result').textContent = `Error: ${e.message}`;
                document.getElementById('users-result').parentElement.classList.add('error');
            }
        }
    </script>
</body>
</html>
